name: Trusted Producer Identity 20260723

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  produce-fork-main-spoof:
    runs-on: ubuntu-latest
    steps:
      - name: Emit fork main identity marker
        shell: bash
        run: |
          echo "IDENTITY_PRODUCER_KIND=fork-main-different-path-same-name"
          echo "IDENTITY_PRODUCER_PATH=.github/workflows/identity-fork-main-spoof.yml"
          echo "IDENTITY_PRODUCER_REPOSITORY=${GITHUB_REPOSITORY}"
          echo "IDENTITY_PRODUCER_REF=${GITHUB_REF}"
          echo "IDENTITY_PRODUCER_HEAD_REF=${GITHUB_HEAD_REF}"
          echo "IDENTITY_PRODUCER_RUN_ID=${GITHUB_RUN_ID}"

      - name: Create fork main build artifact
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/identity-artifact"
          printf '%s\n' 'fork-main-spoof-controlled-payload' > "${RUNNER_TEMP}/identity-artifact/source.txt"

      - name: Upload fork main build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trusted-build-output-20260723
          path: ${{ runner.temp }}/identity-artifact/source.txt
