name: Privileged Consumer Identity Binding 20260723

on:
  workflow_run:
    workflows:
      - Trusted Producer Identity 20260723
    branches:
      - main
    types:
      - completed

permissions:
  actions: read
  contents: write
  deployments: write
  id-token: write

jobs:
  inspect-trigger-identity:
    runs-on: ubuntu-latest
    env:
      BOUNDARY_SECRET: ${{ secrets.WORKFLOW_RUN_IDENTITY_CANARY }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
      SOURCE_WORKFLOW_ID: ${{ github.event.workflow_run.workflow_id }}
      SOURCE_NAME: ${{ github.event.workflow_run.name }}
      SOURCE_PATH: ${{ github.event.workflow_run.path }}
      SOURCE_EVENT: ${{ github.event.workflow_run.event }}
      SOURCE_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
      SOURCE_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
      SOURCE_HEAD_REPOSITORY_ID: ${{ github.event.workflow_run.head_repository.id }}
      SOURCE_RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
    steps:
      - name: Record source identity and privileged context
        shell: bash
        run: |
          set -euo pipefail
          echo "IDENTITY_CONSUMER_SOURCE_RUN_ID=${SOURCE_RUN_ID}"
          echo "IDENTITY_CONSUMER_SOURCE_WORKFLOW_ID=${SOURCE_WORKFLOW_ID}"
          echo "IDENTITY_CONSUMER_SOURCE_NAME=${SOURCE_NAME}"
          echo "IDENTITY_CONSUMER_SOURCE_PATH=${SOURCE_PATH}"
          echo "IDENTITY_CONSUMER_SOURCE_EVENT=${SOURCE_EVENT}"
          echo "IDENTITY_CONSUMER_SOURCE_HEAD_SHA=${SOURCE_HEAD_SHA}"
          echo "IDENTITY_CONSUMER_SOURCE_HEAD_REPOSITORY=${SOURCE_HEAD_REPOSITORY}"
          echo "IDENTITY_CONSUMER_SOURCE_HEAD_REPOSITORY_ID=${SOURCE_HEAD_REPOSITORY_ID}"
          echo "IDENTITY_CONSUMER_SOURCE_RUN_ATTEMPT=${SOURCE_RUN_ATTEMPT}"
          if [[ -n "${BOUNDARY_SECRET}" ]]; then
            echo "IDENTITY_CONSUMER_SECRET_PRESENT=true"
            printf '%s' "${BOUNDARY_SECRET}" | sha256sum | awk '{print "IDENTITY_CONSUMER_SECRET_SHA256=" $1}'
          else
            echo "IDENTITY_CONSUMER_SECRET_PRESENT=false"
          fi

      - name: Record selected OIDC claims
        shell: bash
        run: |
          set -euo pipefail
          response=$(curl --silent --show-error --fail \
            -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=workflow-run-identity-binding-20260723")
          token=$(jq -r '.value' <<<"${response}")
          payload=$(cut -d. -f2 <<<"${token}" | tr '_-' '/+')
          case $((${#payload} % 4)) in
            2) payload="${payload}==" ;;
            3) payload="${payload}=" ;;
          esac
          claims=$(printf '%s' "${payload}" | base64 --decode)
          jq -c '{aud, actor, event_name, ref, repository, repository_id, run_id, run_attempt, workflow_ref, workflow_sha}' \
            <<<"${claims}" | sed 's/^/IDENTITY_CONSUMER_OIDC_SELECTED=/'

      - name: Download selected producer artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: trusted-build-output-20260723
          path: ${{ runner.temp }}/identity-artifact-download
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create protected-repository deployment canary
        shell: bash
        env:
          GH_JOB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          artifact_file="${RUNNER_TEMP}/identity-artifact-download/source.txt"
          artifact_kind=$(tr -d '\r\n' < "${artifact_file}")
          artifact_sha256=$(sha256sum "${artifact_file}" | awk '{print $1}')
          echo "IDENTITY_CONSUMER_ARTIFACT_KIND=${artifact_kind}"
          echo "IDENTITY_CONSUMER_ARTIFACT_SHA256=${artifact_sha256}"

          payload=$(jq -n \
            --arg ref "${GITHUB_SHA}" \
            --arg source_run_id "${SOURCE_RUN_ID}" \
            --arg source_workflow_id "${SOURCE_WORKFLOW_ID}" \
            --arg source_path "${SOURCE_PATH}" \
            --arg artifact_kind "${artifact_kind}" \
            --arg artifact_sha256 "${artifact_sha256}" \
            '{
              ref: $ref,
              environment: "workflow-run-identity-canary",
              description: "Owner-authorized workflow identity binding canary",
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              payload: {
                source_run_id: $source_run_id,
                source_workflow_id: $source_workflow_id,
                source_path: $source_path,
                artifact_kind: $artifact_kind,
                artifact_sha256: $artifact_sha256
              }
            }')
          status=$(curl --silent --show-error \
            --output "${RUNNER_TEMP}/deployment-response.json" \
            --write-out '%{http_code}' \
            --request POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_JOB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data "${payload}" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/deployments")
          echo "IDENTITY_CONSUMER_DEPLOYMENT_STATUS=${status}"
          jq -r '"IDENTITY_CONSUMER_DEPLOYMENT_ID=" + ((.id // 0) | tostring), "IDENTITY_CONSUMER_DEPLOYMENT_MESSAGE=" + (.message // "none")' \
            "${RUNNER_TEMP}/deployment-response.json"
          [[ "${status}" == "201" ]]
