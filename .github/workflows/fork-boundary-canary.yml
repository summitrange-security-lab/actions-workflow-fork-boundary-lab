name: Fork Workflow Boundary Canary

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Emit harmless execution marker
        run: echo "FORK_APP_WORKFLOW_EXECUTION_CANARY"

      - name: Hash harmless repository secret canary
        env:
          CANARY_SECRET: ${{ secrets.FORK_BOUNDARY_CANARY }}
        run: |
          digest=$(printf '%s' "$CANARY_SECRET" | sha256sum | cut -d ' ' -f1)
          echo "FORK_BOUNDARY_SECRET_SHA256=${digest}"
